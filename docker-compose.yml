services:

  db:
    image: pgvector/pgvector:pg16
    container_name: orbitwatch-db
    restart: always
    env_file:
      - .env.docker
    ports:
      - "5432:5432"
    volumes:
      - orbitwatch_data:/var/lib/postgresql/data


  redis:
    image: redis:7
    container_name: orbitwatch-redis
    ports:
      - "6379:6379"


  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: orbitwatch-backend
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    environment:
      - PYTHONPATH=/app
    depends_on:
      - db
      - redis
    volumes:
      - .:/app


  worker:
    build:
      context: .
      dockerfile: worker.Dockerfile
    container_name: orbitwatch-worker
    env_file:
      - .env.docker
    environment:
      - PYTHONPATH=/app
    depends_on:
      - db
      - redis
    volumes:
      - .:/app


  frontend:
    build:
      context: ./frontend
      dockerfile: frontend.Dockerfile
    container_name: orbitwatch-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes: 
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

  telemetry-generator:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: orbitwatch-generator
    env_file:
      - .env.docker
    environment:
      - PYTHONPATH=/app
    command: python /app/app/telemetry/scripts/generate_telemetry.py
    depends_on:
      - redis
    volumes:
      - .:/app


volumes:
  orbitwatch_data: