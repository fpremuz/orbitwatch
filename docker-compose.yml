services:

  db:
    image: postgres:16
    container_name: orbitwatch-db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - orbitwatch_data:/var/lib/postgresql/data


  redis:
    image: redis:7
    container_name: orbitwatch-redis
    ports:
      - "6379:6379"


  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: orbitwatch-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - .:/app


  worker:
    build:
      context: .
      dockerfile: worker.Dockerfile
    container_name: orbitwatch-worker
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - .:/app


  frontend:
    build:
      context: ./frontend
      dockerfile: frontend.Dockerfile
    container_name: orbitwatch-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes: 
      - ./frontend:/app
      - /app/node_modules


volumes:
  orbitwatch_data: